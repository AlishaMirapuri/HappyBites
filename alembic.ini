[alembic]
# Path to migration scripts directory
script_location = alembic

# Prepend project root to sys.path so `happybites` package is importable
prepend_sys_path = .

# Template to use when generating new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for "Create Date" in migration files
timezone = UTC

# Version path separator (os = platform default)
version_path_separator = os

# SQLAlchemy URL — overridden at runtime by alembic/env.py via pydantic Settings
# This placeholder prevents alembic from erroring on startup
sqlalchemy.url = sqlite:///./happybites.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
